<VirtualHost *:80>
    ServerName ec2-3-90-40-114.compute-1.amazonaws.com

    DocumentRoot /var/www/html/crud
    <Directory /var/www/html/crud>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined

    DirectoryIndex index.php
    ProxyPass /crud/ http://localhost/
    ProxyPassReverse /crud/ http://localhost/
</VirtualHost>
